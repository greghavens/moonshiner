name: release
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
permissions: {contents: read}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: sudo apt-get update && sudo apt-get install -y bubblewrap
      - run: python -m unittest discover -s tests -v
      - run: python -m pip install build twine
      - run: python -m build && python -m twine check dist/*
      - run: |
          python -m venv /tmp/moonshiner-smoke
          /tmp/moonshiner-smoke/bin/pip install dist/*.whl
          MOONSHINER_HOME=/tmp/moonshiner-data /tmp/moonshiner-smoke/bin/moonshiner --help
          cd dist && sha256sum * > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with: {name: distributions, path: "dist/*"}
  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions: {contents: write, id-token: write, attestations: write}
    steps:
      - uses: actions/download-artifact@v4
        with: {name: distributions, path: dist}
      - uses: actions/attest-build-provenance@v2
        with: {subject-path: "dist/*"}
      - run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --repo "$GITHUB_REPOSITORY"
        env: {GH_TOKEN: "${{ github.token }}"}
  public-install-smoke:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Install with the documented default command
        env:
          HOME: /tmp/moonshiner-release-user
          XDG_CONFIG_HOME: /tmp/moonshiner-release-user/.config
          XDG_DATA_HOME: /tmp/moonshiner-release-user/.local/share
        run: |
          mkdir -p "$HOME"
          curl -fsSL "https://raw.githubusercontent.com/$GITHUB_REPOSITORY/$GITHUB_REF_NAME/install.sh" | bash
          export PATH="$HOME/.local/bin:$PATH"
          command -v moonshiner
          moonshiner --version | grep -Fx "moonshiner ${GITHUB_REF_NAME#v}"
          moonshiner seeds status | grep -E '\([1-9][0-9]* seeds\)'
  pypi:
    needs: build
    if: ${{ vars.PYPI_TRUSTED_PUBLISHING == 'enabled' }}
    runs-on: ubuntu-latest
    environment: {name: pypi, url: "https://pypi.org/p/moonshiner"}
    permissions: {id-token: write}
    steps:
      - uses: actions/download-artifact@v4
        with: {name: distributions, path: dist}
      - run: rm dist/SHA256SUMS
      - uses: pypa/gh-action-pypi-publish@release/v1
