name: seed-corpus-release
on:
  push:
    tags: ["seeds-[0-9]+.[0-9]+.[0-9]+.[0-9]+"]
permissions: {contents: read}
jobs:
  release:
    runs-on: ubuntu-latest
    permissions: {contents: write, id-token: write, attestations: write}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: |
          version="${GITHUB_REF_NAME#seeds-}"
          PYTHONPATH=src python -m corpus manifest --version "$version" --output MANIFEST.json
          PYTHONPATH=src python -m corpus catalog --output SEED_CATALOG.md
          PYTHONPATH=src python -m corpus catalog --json --output SEED_CATALOG.json
          mkdir -p "moonshiner-seeds-$version/tasks"
          cp MANIFEST.json corpus-version.json SEED_CATALOG.md SEED_CATALOG.json "moonshiner-seeds-$version/"
          cp -a tasks/seeds "moonshiner-seeds-$version/tasks/"
          cp -a tasks/behavior-seeds "moonshiner-seeds-$version/tasks/"
          cp tasks/behavior-worlds.json "moonshiner-seeds-$version/tasks/"
          tar -czf "moonshiner-seeds-$version.tar.gz" "moonshiner-seeds-$version"
          sha256sum "moonshiner-seeds-$version.tar.gz" > SHA256SUMS
      - uses: actions/attest-build-provenance@v2
        with: {subject-path: "moonshiner-seeds-*.tar.gz"}
      - run: gh release create "$GITHUB_REF_NAME" moonshiner-seeds-*.tar.gz SHA256SUMS --verify-tag --generate-notes
        env: {GH_TOKEN: "${{ github.token }}"}
